title: sunxie
name: sunxie
description: >-
  欢迎来到我的空间
baseurl: ""
url: "https://blog.sunxie.me"
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"
locale: "zh-CN"
timezone: "Asia/Shanghai"

# 让Jekyll处理 _pages 下的归档页与固定页面
include:
  - _pages

# ========================================
# 莫兰迪风格主题配置
# ========================================

# SASS 编译配置
sass:
  sass_dir: _sass
  style: compressed

# 自定义样式覆盖
custom_theme: morandi          # 莫兰迪风格主题

# 站点作者信息（用于 Minimal Mistakes 侧边作者卡片）
author:
  name: "sunxie"
  avatar: ""   # 例如 /assets/images/avatar.jpg
  bio: "code is cheap,show me your talk"
  location: "Beijing, China"
  email: "ssunxie@163.com"
  uri: ""
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/xiesunsun"


# 插件
plugins:
  - jekyll-paginate
  - jekyll-archives
  - jekyll-include-cache
  - jekyll-sass-converter

# 中文友好设置
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      toc: true
      toc_sticky: true
      read_time: true
      comments: true
      
# 文件编码设置
encoding: utf-8

# 显示草稿和未来的文章（本地开发）
show_drafts: false
future: false

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - deploy.sh
