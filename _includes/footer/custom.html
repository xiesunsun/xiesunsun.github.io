<script>
  function initMobileNav() {
    var nav = document.querySelector(".greedy-nav");
    if (!nav) return;

    var visibleLinks = nav.querySelector(".visible-links");
    var hiddenLinks = nav.querySelector(".hidden-links");
    var toggle = nav.querySelector(".greedy-nav__toggle");
    if (!visibleLinks || !hiddenLinks || !toggle) return;

    var originalItems = Array.from(visibleLinks.children).concat(Array.from(hiddenLinks.children));
    if (!originalItems.length) return;

    var narrowQuery = window.matchMedia("(max-width: 480px)");
    var compactQuery = window.matchMedia("(max-width: 360px)");

    function renderNav() {
      visibleLinks.innerHTML = "";
      hiddenLinks.innerHTML = "";

      if (!narrowQuery.matches) {
        originalItems.forEach(function (item) {
          visibleLinks.appendChild(item);
        });
        toggle.classList.add("hidden");
        toggle.classList.remove("close");
        hiddenLinks.classList.add("hidden");
        toggle.setAttribute("count", "0");
        return;
      }

      var visibleCount = compactQuery.matches ? 2 : 3;
      originalItems.forEach(function (item, index) {
        if (index < visibleCount) {
          visibleLinks.appendChild(item);
        } else {
          hiddenLinks.appendChild(item);
        }
      });

      var hasHiddenItems = hiddenLinks.children.length > 0;
      toggle.classList.toggle("hidden", !hasHiddenItems);
      toggle.setAttribute("count", String(hiddenLinks.children.length));

      if (!hasHiddenItems) {
        hiddenLinks.classList.add("hidden");
        toggle.classList.remove("close");
      }
    }

    renderNav();
    window.addEventListener("resize", renderNav, { passive: true });
    window.addEventListener("load", renderNav, { once: true });
    window.setTimeout(renderNav, 180);

    if (typeof narrowQuery.addEventListener === "function") {
      narrowQuery.addEventListener("change", renderNav);
      compactQuery.addEventListener("change", renderNav);
    } else if (typeof narrowQuery.addListener === "function") {
      narrowQuery.addListener(renderNav);
      compactQuery.addListener(renderNav);
    }
  }

  function initThemeToggle() {
    var nav = document.querySelector(".greedy-nav");
    var logo = document.querySelector(".greedy-nav .site-title") ||
      document.querySelector(".masthead .site-title");
    if (!logo) return;

    var btn = document.getElementById("theme-toggle");
    if (!btn) {
      btn = document.createElement("button");
      btn.id = "theme-toggle";
      btn.type = "button";
      btn.title = "切换浅色/深色";
      btn.setAttribute("aria-label", "切换浅色/深色");
      btn.innerHTML =
        '<svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>' +
        '<svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>';

      if (logo.parentElement) {
        logo.insertAdjacentElement("afterend", btn);
      }
    }

    function isDark() {
      return document.documentElement.classList.contains("dark");
    }

    function apply(dark) {
      document.documentElement.classList.toggle("dark", dark);
      if (document.body) document.body.classList.toggle("dark", dark);
      try {
        localStorage.setItem("pref-theme", dark ? "dark" : "light");
      } catch (e) {}
    }

    // Avoid double-binding if script re-runs
    if (!btn.dataset.bound) {
      btn.dataset.bound = "1";
      btn.addEventListener("click", function () {
        apply(!isDark());
      });
    }

    apply(isDark());
  }

  /**
   * Scroll-spy for desktop TOC.
   * Theme Gumshoe often fails when both mobile + desktop nav.toc exist;
   * this only watches .page__toc-desktop and highlights the current section.
   */
  function initTocSpy() {
    var tocRoot = document.querySelector(".page__toc-desktop nav.toc");
    if (!tocRoot || tocRoot.dataset.spyBound === "1") return;

    var links = Array.prototype.slice.call(
      tocRoot.querySelectorAll(".toc__menu a[href^='#']")
    );
    if (!links.length) return;

    var headings = [];
    links.forEach(function (link) {
      var href = link.getAttribute("href") || "";
      var id = href.charAt(0) === "#" ? href.slice(1) : "";
      if (!id) return;
      var el = null;
      try {
        el = document.getElementById(id) || document.getElementById(decodeURIComponent(id));
      } catch (e) {
        el = document.getElementById(id);
      }
      if (el) {
        headings.push({ el: el, id: el.id || id, link: link });
      }
    });
    if (!headings.length) return;

    tocRoot.dataset.spyBound = "1";
    var lastId = null;
    var topOffset = 96; // masthead + breathing room

    function clearActive() {
      tocRoot.querySelectorAll(".toc__menu li.active, .toc__menu li.is-active").forEach(function (li) {
        li.classList.remove("active", "is-active");
      });
      tocRoot.querySelectorAll(".toc__menu a.active, .toc__menu a.is-active").forEach(function (a) {
        a.classList.remove("active", "is-active");
      });
    }

    function setActive(entry) {
      if (!entry || entry.id === lastId) return;
      lastId = entry.id;
      clearActive();

      var link = entry.link;
      link.classList.add("active", "is-active");

      var li = link.closest("li");
      while (li && tocRoot.contains(li)) {
        li.classList.add("active", "is-active");
        var parentUl = li.parentElement;
        li = parentUl && parentUl.closest ? parentUl.closest("li") : null;
      }

      // Keep active item visible inside long TOC
      try {
        link.scrollIntoView({ block: "nearest", inline: "nearest", behavior: "smooth" });
      } catch (e) {
        /* ignore */
      }
    }

    function update() {
      // Choose the last heading whose top has crossed the offset line
      var current = headings[0];
      for (var i = 0; i < headings.length; i++) {
        var top = headings[i].el.getBoundingClientRect().top;
        if (top - topOffset <= 0) {
          current = headings[i];
        } else {
          break;
        }
      }
      // Near page bottom: force last section
      var scrollBottom = window.innerHeight + window.pageYOffset;
      var docHeight = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );
      if (docHeight - scrollBottom < 48) {
        current = headings[headings.length - 1];
      }
      setActive(current);
    }

    var ticking = false;
    function onScroll() {
      if (ticking) return;
      ticking = true;
      window.requestAnimationFrame(function () {
        ticking = false;
        update();
      });
    }

    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll, { passive: true });
    // Run after layout / images settle
    update();
    window.setTimeout(update, 200);
    window.setTimeout(update, 800);
  }

  function boot() {
    initMobileNav();
    initThemeToggle();
    initTocSpy();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", boot, { once: true });
  } else {
    boot();
  }
</script>
